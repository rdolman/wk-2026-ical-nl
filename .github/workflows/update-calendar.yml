name: Update WK 2026 kalender

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kalender bijwerken
        run: python scripts/build_calendar.py
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}

      - name: Wijzigingen committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update WK 2026 kalender'
          file_pattern: 'wk2026.ics'

    